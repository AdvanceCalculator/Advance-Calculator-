<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator - SmartCalc</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(30, 41, 59, 0.9); border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .navbar { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #f8fafc; text-decoration: none; }
        .logo span { color: #06b6d4; }
        .nav-links { display: flex; gap: 0.8rem; list-style: none; flex-wrap: wrap; }
        .nav-links a { color: #94a3b8; text-decoration: none; font-weight: 500; padding: 0.5rem 0.8rem; border-radius: 8px; transition: 0.3s; font-size: 0.9rem; }
        .nav-links a:hover, .nav-links a.active { color: #fff; background: #4f46e5; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; flex: 1; }
        .calc-box { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 2rem; max-width: 600px; margin: 0 auto; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .calc-box h2 { margin-bottom: 1.5rem; text-align: center; color: #818cf8; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; }
        .form-group input:focus { border-color: #4f46e5; }
        .btn-submit { width: 100%; padding: 1rem; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn-submit:hover { background: #4338ca; }
        .result-box { margin-top: 1.5rem; padding: 1.2rem; background: rgba(6, 182, 212, 0.1); border: 1px solid #06b6d4; border-radius: 12px; text-align: center; display: none; }
        .result-box h3 { color: #06b6d4; font-size: 1.6rem; }
        .quick-links-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #334155; text-align: center; }
        .quick-links-section h4 { margin-bottom: 1rem; color: #94a3b8; font-size: 0.95rem; }
        .quick-buttons { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; }
        .quick-btn { padding: 0.5rem 1rem; background: #0f172a; border: 1px solid #334155; color: #f8fafc; border-radius: 20px; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .quick-btn:hover { background: #4f46e5; border-color: #4f46e5; }
        footer { text-align: center; padding: 1.5rem; background: #1e293b; border-top: 1px solid #334155; color: #94a3b8; font-size: 0.85rem; margin-top: auto; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">⚡ Smart<span>Calc</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="emi.html" class="active">EMI</a></li>
                <li><a href="sip.html">SIP</a></li>
                <li><a href="fd.html">FD</a></li>
                <li><a href="gst.html">GST</a></li>
                <li><a href="loan.html">Loan</a></li>
                <li><a href="tax.html">Tax</a></li>
                <li><a href="age.html">Age</a></li>
                <li><a href="bmi.html">BMI</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="calc-box">
            <h2>🏦 EMI Calculator</h2>
            
            <div class="form-group">
                <label>Loan Amount (₹)</label>
                <input type="number" id="amount" value="500000">
            </div>

            <div class="form-group">
                <label>Interest Rate (% P.A.)</label>
                <input type="number" step="0.1" id="rate" value="8.5">
            </div>

            <div class="form-group">
                <label>Tenure (Years)</label>
                <input type="number" id="tenure" value="5">
            </div>

            <button class="btn-submit" onclick="calculateEMI()">Calculate EMI</button>

            <div class="result-box" id="resultBox">
                <p style="color: #94a3b8; font-size: 0.9rem;">Monthly Payable EMI</p>
                <h3 id="emiResult">₹0</h3>
                <p style="margin-top: 10px; font-size: 0.85rem; color: #cbd5e1;">
                    Total Interest: <strong id="totalInterest" style="color: #fff;">₹0</strong> | 
                    Total Amount: <strong id="totalAmount" style="color: #fff;">₹0</strong>
                </p>
            </div>

            <!-- Calculated hone ke baad baaki calculators par jaane ke buttons -->
            <div class="quick-links-section">
                <h4>Switch to Other Calculators:</h4>
                <div class="quick-buttons">
                    <a href="sip.html" class="quick-btn">📈 SIP</a>
                    <a href="fd.html" class="quick-btn">💰 FD</a>
                    <a href="gst.html" class="quick-btn">📊 GST</a>
                    <a href="loan.html" class="quick-btn">💳 Loan</a>
                    <a href="tax.html" class="quick-btn">📝 Tax</a>
                    <a href="age.html" class="quick-btn">🎂 Age</a>
                    <a href="bmi.html" class="quick-btn">⚖️ BMI</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 SmartCalc Suite. All rights reserved.</p>
    </footer>

    <script>
        function calculateEMI() {
            const P = parseFloat(document.getElementById('amount').value);
            const annualRate = parseFloat(document.getElementById('rate').value);
            const years = parseFloat(document.getElementById('tenure').value);

            if (!P || !annualRate || !years) {
                alert("Please enter valid input values.");
                return;
            }

            const r = annualRate / 12 / 100;
            const n = years * 12;

            const emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            const totalPayable = emi * n;
            const totalInt = totalPayable - P;

            document.getElementById('emiResult').innerText = "₹" + Math.round(emi).toLocaleString('en-IN');
            document.getElementById('totalInterest').innerText = "₹" + Math.round(totalInt).toLocaleString('en-IN');
            document.getElementById('totalAmount').innerText = "₹" + Math.round(totalPayable).toLocaleString('en-IN');

            document.getElementById('resultBox').style.display = 'block';
        }
    </script>
</body>
</html>
