<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Calculator - SmartCalc</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(30, 41, 59, 0.9); border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .navbar { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #f8fafc; text-decoration: none; }
        .logo span { color: #06b6d4; }
        .nav-links { display: flex; gap: 0.8rem; list-style: none; flex-wrap: wrap; }
        .nav-links a { color: #94a3b8; text-decoration: none; font-weight: 500; padding: 0.5rem 0.8rem; border-radius: 8px; transition: 0.3s; font-size: 0.9rem; }
        .nav-links a:hover, .nav-links a.active { color: #fff; background: #4f46e5; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; flex: 1; }
        
        /* Calculator Card Styling */
        .calc-box { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 1.5rem; max-width: 360px; margin: 0 auto; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4); }
        .calc-box h2 { margin-bottom: 1rem; text-align: center; color: #818cf8; font-size: 1.3rem; }
        
        /* Phone Display Screen */
        .display-screen { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 1rem; text-align: right; margin-bottom: 1.2rem; min-height: 80px; display: flex; flex-direction: column; justify-content: flex-end; word-wrap: break-word; word-break: break-all; }
        .history { color: #94a3b8; font-size: 0.85rem; min-height: 20px; }
        .current-input { color: #06b6d4; font-size: 1.8rem; font-weight: 600; }

        /* Keypad Grid (Android Style) */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { padding: 1rem 0; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.2s; background: #334155; color: #f8fafc; outline: none; }
        .btn:active { transform: scale(0.95); }
        .btn-op { background: #4f46e5; color: white; }
        .btn-op:hover { background: #4338ca; }
        .btn-action { background: #ef4444; color: white; }
        .btn-action:hover { background: #dc2626; }
        .btn-equal { background: #06b6d4; color: #0f172a; grid-column: span 2; font-size: 1.4rem; }
        .btn-equal:hover { background: #0891b2; }

        /* Bottom Navigation Buttons */
        .quick-links-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #334155; text-align: center; }
        .quick-links-section h4 { margin-bottom: 1rem; color: #94a3b8; font-size: 0.95rem; }
        .quick-buttons { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; }
        .quick-btn { padding: 0.5rem 1rem; background: #0f172a; border: 1px solid #334155; color: #f8fafc; border-radius: 20px; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .quick-btn:hover { background: #4f46e5; }
        footer { text-align: center; padding: 1.5rem; background: #1e293b; border-top: 1px solid #334155; color: #94a3b8; font-size: 0.85rem; margin-top: auto; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">⚡ Smart<span>Calc</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="normal.html" class="active">Normal</a></li>
                <li><a href="emi.html">EMI</a></li>
                <li><a href="sip.html">SIP</a></li>
                <li><a href="fd.html">FD</a></li>
                <li><a href="gst.html">GST</a></li>
                <li><a href="loan.html">Loan</a></li>
                <li><a href="tax.html">Tax</a></li>
                <li><a href="age.html">Age</a></li>
                <li><a href="bmi.html">BMI</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="calc-box">
            <h2>📱 Normal Calculator</h2>
            
            <!-- Android Style Screen -->
            <div class="display-screen">
                <div class="history" id="historyText"></div>
                <div class="current-input" id="displayText">0</div>
            </div>

            <!-- Keypad -->
            <div class="keypad">
                <button class="btn btn-action" onclick="clearAll()">C</button>
                <button class="btn btn-action" onclick="deleteChar()">⌫</button>
                <button class="btn btn-op" onclick="appendOp('%')">%</button>
                <button class="btn btn-op" onclick="appendOp('/')">÷</button>

                <button class="btn" onclick="appendNum('7')">7</button>
                <button class="btn" onclick="appendNum('8')">8</button>
                <button class="btn" onclick="appendNum('9')">9</button>
                <button class="btn btn-op" onclick="appendOp('*')">×</button>

                <button class="btn" onclick="appendNum('4')">4</button>
                <button class="btn" onclick="appendNum('5')">5</button>
                <button class="btn" onclick="appendNum('6')">6</button>
                <button class="btn btn-op" onclick="appendOp('-')">-</button>

                <button class="btn" onclick="appendNum('1')">1</button>
                <button class="btn" onclick="appendNum('2')">2</button>
                <button class="btn" onclick="appendNum('3')">3</button>
                <button class="btn btn-op" onclick="appendOp('+')">+</button>

                <button class="btn" onclick="appendNum('0')">0</button>
                <button class="btn" onclick="appendNum('.')">.</button>
                <button class="btn btn-equal" onclick="calculateResult()">=</button>
            </div>

            <!-- Links to All Other Calculators -->
            <div class="quick-links-section">
                <h4>Switch to Other Calculators:</h4>
                <div class="quick-buttons">
                    <a href="emi.html" class="quick-btn">🏦 EMI</a>
                    <a href="sip.html" class="quick-btn">📈 SIP</a>
                    <a href="fd.html" class="quick-btn">💰 FD</a>
                    <a href="gst.html" class="quick-btn">📊 GST</a>
                    <a href="loan.html" class="quick-btn">💳 Loan</a>
                    <a href="tax.html" class="quick-btn">📝 Tax</a>
                    <a href="age.html" class="quick-btn">🎂 Age</a>
                    <a href="bmi.html" class="quick-btn">⚖️ BMI</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 SmartCalc Suite. All rights reserved.</p>
    </footer>

    <script>
        let currentInput = "0";
        let isEvaluated = false;

        const display = document.getElementById('displayText');
        const history = document.getElementById('historyText');

        function updateDisplay() {
            display.innerText = currentInput;
        }

        function appendNum(num) {
            if (currentInput === "0" || isEvaluated) {
                currentInput = num;
                isEvaluated = false;
            } else {
                currentInput += num;
            }
            updateDisplay();
        }

        function appendOp(op) {
            if (isEvaluated) isEvaluated = false;
            const lastChar = currentInput.slice(-1);
            if (["+", "-", "*", "/", "%"].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + op;
            } else {
                currentInput += op;
            }
            updateDisplay();
        }

        function clearAll() {
            currentInput = "0";
            history.innerText = "";
            isEvaluated = false;
            updateDisplay();
        }

        function deleteChar() {
            if (isEvaluated) {
                clearAll();
                return;
            }
            if (currentInput.length === 1) {
                currentInput = "0";
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
        }

        function calculateResult() {
            try {
                let expression = currentInput.replace(/%/g, "/100");
                history.innerText = currentInput + " =";
                let result = eval(expression);

                // Handle Decimal Precision
                if (!Number.isInteger(result)) {
                    result = parseFloat(result.toFixed(6));
                }

                currentInput = result.toString();
                isEvaluated = true;
                updateDisplay();
            } catch (error) {
                display.innerText = "Error";
                currentInput = "0";
                isEvaluated = true;
            }
        }
    </script>
</body>
</html>
