<!DOCTYPE HTML>
<html>
  <head>
    <title>EMI Calculator - Advance Calculator</title>
    <style>
      body{
        background-color: lightgoldenrodyellow;
        font-family: Georgia;
        text-align:center;
      }
      h1{
        color: blue;
        font-size: 36px;
      }
      .nav-btn{
        background-color: blue;
        color: white;
        width: 200px;
        height: 45px;
        font-size: 14px;
        font-family: Georgia;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        margin:5px;
      }
      .nav-btn:hover{
        background-color: red;
      }
      a{ text-decoration:none; }

      .card {
        background:#25253d;
        border-radius:18px;
        padding:25px;
        width:90%;
        max-width:380px;
        margin:25px auto;
        box-shadow:0 10px 30px rgba(0,0,0,0.4);
        color:#fff;
        text-align:left;
      }
      .form-group { margin-bottom:15px; }
      .form-group label { display:block; margin-bottom:6px; font-size:14px; color:#ccc; }
      .form-group input {
        width:100%;
        padding:12px;
        border-radius:8px;
        border:none;
        background:#111120;
        color:#fff;
        font-size:15px;
        box-sizing:border-box;
      }
      .calc-action-btn {
        width:100%;
        padding:14px;
        margin-top:10px;
        border:none;
        border-radius:10px;
        background: linear-gradient(90deg,#00c6ff,#0072ff);
        color:#fff;
        font-size:16px;
        font-weight:600;
        cursor:pointer;
      }
      .calc-action-btn:hover { opacity:0.9; }

      .result-box {
        margin-top:18px;
        background:#111120;
        border-radius:10px;
        padding:15px;
        display:none;
      }
      .result-box.show { display:block; }
      .result-row {
        display:flex;
        justify-content:space-between;
        padding:6px 0;
        font-size:14px;
        color:#ddd;
        border-bottom:1px solid #2a2a40;
      }
      .result-row:last-child { border-bottom:none; }
      .result-row .val { font-weight:700; color:#00c6ff; }
    </style>
  </head>
  <body>

    <h1>🏦 EMI Calculator</h1>

    <div class="card">
      <div class="form-group">
        <label>Loan Amount (₹)</label>
        <input type="number" id="loanAmount" placeholder="e.g. 500000">
      </div>
      <div class="form-group">
        <label>Interest Rate (Annual %)</label>
        <input type="number" id="interestRate" placeholder="e.g. 8.5">
      </div>
      <div class="form-group">
        <label>Loan Tenure (Years)</label>
        <input type="number" id="tenure" placeholder="e.g. 5">
      </div>
      <button class="calc-action-btn" onclick="calculateEMI()">Calculate EMI</button>

      <div class="result-box" id="emiResult">
        <div class="result-row"><span>Monthly EMI</span><span class="val" id="emiMonthly">-</span></div>
        <div class="result-row"><span>Total Interest</span><span class="val" id="emiInterest">-</span></div>
        <div class="result-row"><span>Total Payment</span><span class="val" id="emiTotal">-</span></div>
      </div>
    </div>

    <center>
      <a href="normal.html"><button class="nav-btn">Normal Calculator</button></a>
      <a href="age.html"><button class="nav-btn">Age Calculator</button></a>
      <br>
      <a href="index.html"><button class="nav-btn">🏠 Home</button></a>
    </center>
    <br>

    <script>
      function calculateEMI() {
        const P = parseFloat(document.getElementById('loanAmount').value);
        const annualRate = parseFloat(document.getElementById('interestRate').value);
        const years = parseFloat(document.getElementById('tenure').value);

        if (!P || !annualRate || !years) {
          alert("Please fill all fields with valid numbers.");
          return;
        }

        const R = annualRate / 12 / 100;
        const N = years * 12;
        const emi = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);
        const totalPayment = emi * N;
        const totalInterest = totalPayment - P;

        document.getElementById('emiMonthly').innerText = "₹ " + emi.toFixed(2);
        document.getElementById('emiInterest').innerText = "₹ " + totalInterest.toFixed(2);
        document.getElementById('emiTotal').innerText = "₹ " + totalPayment.toFixed(2);
        document.getElementById('emiResult').classList.add('show');
      }
    </script>
  </body>
</html>
