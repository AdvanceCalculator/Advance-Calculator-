<!DOCTYPE HTML>
<html>
  <head>
    <title>Age Calculator - Advance  Calculator</title>
    <style>
      body{
        background-color: lightgoldenrodyellow;
        font-family: Georgia;
        text-align:center;
      }
      h1{
        color: blue;
        font-size: 36px;
      }
      .nav-btn{
        background-color: blue;
        color: white;
        width: 200px;
        height: 45px;
        font-size: 14px;
        font-family: Georgia;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        margin:5px;
      }
      .nav-btn:hover{
        background-color: red;
      }
      a{ text-decoration:none; }

      .card {
        background:#25253d;
        border-radius:18px;
        padding:25px;
        width:90%;
        max-width:380px;
        margin:25px auto;
        box-shadow:0 10px 30px rgba(0,0,0,0.4);
        color:#fff;
        text-align:left;
      }
      .form-group { margin-bottom:15px; }
      .form-group label { display:block; margin-bottom:6px; font-size:14px; color:#ccc; }
      .dob-row{ display:flex; gap:10px; }
      .form-group input {
        width:100%;
        padding:12px;
        border-radius:8px;
        border:none;
        background:#111120;
        color:#fff;
        font-size:15px;
        box-sizing:border-box;
      }
      .calc-action-btn {
        width:100%;
        padding:14px;
        margin-top:10px;
        border:none;
        border-radius:10px;
        background: linear-gradient(90deg,#00c6ff,#0072ff);
        color:#fff;
        font-size:16px;
        font-weight:600;
        cursor:pointer;
      }
      .calc-action-btn:hover { opacity:0.9; }

      .result-box {
        margin-top:18px;
        background:#111120;
        border-radius:10px;
        padding:15px;
        display:none;
      }
      .result-box.show { display:block; }
      .result-row {
        display:flex;
        justify-content:space-between;
        padding:6px 0;
        font-size:14px;
        color:#ddd;
        border-bottom:1px solid #2a2a40;
      }
      .result-row:last-child { border-bottom:none; }
      .result-row .val { font-weight:700; color:#00c6ff; }
    </style>
  </head>
  <body>

    <h1>🎂 Age Calculator</h1>

    <div class="card">
      <div class="form-group">
        <label>Date of Birth (Type manually)</label>
        <div class="dob-row">
          <input type="number" id="dobDay" placeholder="DD" min="1" max="31">
          <input type="number" id="dobMonth" placeholder="MM" min="1" max="12">
          <input type="number" id="dobYear" placeholder="YYYY" min="1900" max="2100">
        </div>
      </div>
      <button class="calc-action-btn" onclick="calculateAge()">Calculate Age</button>

      <div class="result-box" id="ageResult">
        <div class="result-row"><span>Years</span><span class="val" id="ageYears">-</span></div>
        <div class="result-row"><span>Months</span><span class="val" id="ageMonths">-</span></div>
        <div class="result-row"><span>Days</span><span class="val" id="ageDays">-</span></div>
        <div class="result-row"><span>Total Days Lived</span><span class="val" id="ageTotalDays">-</span></div>
      </div>
    </div>

    <center>
      <a href="normal.html"><button class="nav-btn">Normal Calculator</button></a>
      <a href="emi.html"><button class="nav-btn">EMI Calculator</button></a>
      <br>
      <a href="index.html"><button class="nav-btn">🏠 Home</button></a>
    </center>
    <br>

    <script>
      function calculateAge() {
        const d = parseInt(document.getElementById('dobDay').value);
        const m = parseInt(document.getElementById('dobMonth').value);
        const y = parseInt(document.getElementById('dobYear').value);

        if (!d || !m || !y) {
          alert("Please type valid Day, Month and Year.");
          return;
        }
        if (d < 1 || d > 31 || m < 1 || m > 12 || y < 1900 || y > 2100) {
          alert("Please enter a valid date (DD, MM, YYYY).");
          return;
        }

        const dob = new Date(y, m - 1, d);

        if (dob.getDate() !== d || dob.getMonth() !== m - 1 || dob.getFullYear() !== y) {
          alert("This date does not exist. Please check Day/Month/Year.");
          return;
        }

        const today = new Date();

        if (dob > today) {
          alert("Date of birth cannot be in the future.");
          return;
        }

        let years = today.getFullYear() - dob.getFullYear();
        let months = today.getMonth() - dob.getMonth();
        let days = today.getDate() - dob.getDate();

        if (days < 0) {
          months--;
          const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
          days += lastMonth.getDate();
        }
        if (months < 0) {
          years--;
          months += 12;
        }

        const totalDays = Math.floor((today - dob) / (1000 * 60 * 60 * 24));

        document.getElementById('ageYears').innerText = years;
        document.getElementById('ageMonths').innerText = months;
        document.getElementById('ageDays').innerText = days;
        document.getElementById('ageTotalDays').innerText = totalDays.toLocaleString();
        document.getElementById('ageResult').classList.add('show');
      }
    </script>
  </body>
</html>
