<!DOCTYPE HTML>
<html>
  <head>
    <title>Normal Calculator - Advance Calculator</title>
    <style>
      body{
        background-color: lightgoldenrodyellow;
        font-family: Georgia;
        text-align:center;
      }
      h1{
        color: blue;
        font-size: 36px;
      }
      .nav-btn{
        background-color: blue;
        color: white;
        width: 200px;
        height: 45px;
        font-size: 14px;
        font-family: Georgia;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        margin:5px;
      }
      .nav-btn:hover{
        background-color: red;
      }
      a{ text-decoration:none; }

      .card {
        background:#25253d;
        border-radius:18px;
        padding:25px;
        width:90%;
        max-width:380px;
        margin:25px auto;
        box-shadow:0 10px 30px rgba(0,0,0,0.4);
        color:#fff;
      }
      #display {
        width:100%;
        height:60px;
        background:#111120;
        color:#fff;
        border:none;
        border-radius:10px;
        font-size:26px;
        text-align:right;
        padding:0 15px;
        margin-bottom:15px;
        box-sizing:border-box;
      }
      .btn-grid {
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
      }
      .calc-btn {
        padding:18px 0;
        border:none;
        border-radius:10px;
        background:#33334d;
        color:#fff;
        font-size:18px;
        cursor:pointer;
      }
      .calc-btn:hover { background:#44446a; }
      .calc-btn.op { background:#0072ff; }
      .calc-btn.op:hover { background:#0058c9; }
      .calc-btn.equal { background:#00c853; grid-column: span 2; }
      .calc-btn.equal:hover { background:#00a844; }
      .calc-btn.clear { background:#ff4d4d; }
      .calc-btn.clear:hover { background:#e03e3e; }
    </style>
  </head>
  <body>

    <h1>🧮 Normal Calculator</h1>

    <div class="card">
      <input type="text" id="display" disabled>
      <div class="btn-grid">
        <button class="calc-btn clear" onclick="clearDisplay()">C</button>
        <button class="calc-btn" onclick="deleteLast()">⌫</button>
        <button class="calc-btn op" onclick="appendVal('%')">%</button>
        <button class="calc-btn op" onclick="appendVal('/')">÷</button>

        <button class="calc-btn" onclick="appendVal('7')">7</button>
        <button class="calc-btn" onclick="appendVal('8')">8</button>
        <button class="calc-btn" onclick="appendVal('9')">9</button>
        <button class="calc-btn op" onclick="appendVal('*')">×</button>

        <button class="calc-btn" onclick="appendVal('4')">4</button>
        <button class="calc-btn" onclick="appendVal('5')">5</button>
        <button class="calc-btn" onclick="appendVal('6')">6</button>
        <button class="calc-btn op" onclick="appendVal('-')">−</button>

        <button class="calc-btn" onclick="appendVal('1')">1</button>
        <button class="calc-btn" onclick="appendVal('2')">2</button>
        <button class="calc-btn" onclick="appendVal('3')">3</button>
        <button class="calc-btn op" onclick="appendVal('+')">+</button>

        <button class="calc-btn" onclick="appendVal('0')">0</button>
        <button class="calc-btn" onclick="appendVal('.')">.</button>
        <button class="calc-btn equal" onclick="calculate()">=</button>
      </div>
    </div>

    <center>
      <a href="age.html"><button class="nav-btn">Age Calculator</button></a>
      <a href="emi.html"><button class="nav-btn">EMI Calculator</button></a>
      <br>
      <a href="index.html"><button class="nav-btn">🏠 Home</button></a>
    </center>
    <br>

    <script>
      let displayVal = "";
      const display = document.getElementById('display');

      function appendVal(v) {
        displayVal += v;
        display.value = displayVal;
      }
      function clearDisplay() {
        displayVal = "";
        display.value = "";
      }
      function deleteLast() {
        displayVal = displayVal.slice(0, -1);
        display.value = displayVal;
      }
      function calculate() {
        try {
          let expr = displayVal.replace(/%/g, '/100');
          let result = Function('"use strict";return (' + expr + ')')();
          display.value = result;
          displayVal = String(result);
        } catch (e) {
          display.value = "Error";
          displayVal = "";
        }
      }
    </script>
  </body>
</html>
